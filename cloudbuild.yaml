steps:
  # 1. コンテナイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/haru-repo/haru-first-app:latest', '.']

  # 2. Artifact Registryへのプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/haru-repo/haru-first-app:latest']

  # 3. (オプション) Cloud Runへのデプロイまで自動化する場合
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'haru-first-app'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/haru-repo/haru-first-app:latest'
      - '--region'
      - 'asia-northeast1'
      - '--memory'  
      - '4Gi'
      - '--cpu'
      - '4'           
      - '--timeout'
      - '600'
images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/haru-repo/haru-first-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY