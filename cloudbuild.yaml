steps:
  # 1. Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/revenue-repo/revenue-api:latest'
      - '.'

  # 2. Artifact Registryへのプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/revenue-repo/revenue-api:latest'

  # 3. Cloud Runへのデプロイ（要件のスペックを指定）
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'revenue-api-service'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/revenue-repo/revenue-api:latest'
      - '--region'
      - 'asia-northeast1'      # 東京リージョン
      - '--allow-unauthenticated' # 誰でもアクセス可能にする
      - '--memory'
      - '4Gi'                  # 要件: 2Gi以上 (モデルロード用)
      - '--cpu'
      - '2'                    # 要件: 2以上
      - '--timeout'
      - '300s'                 # 要件: 300秒 (Scrapyクローリング待機用)
      - '--port'
      - '8080'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/revenue-repo/revenue-api:latest'