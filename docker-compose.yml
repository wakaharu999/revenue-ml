services:
  # --- APIサーバー用コンテナ ---
  api:
    platform: linux/arm64  
    build: .
    ports:
      - "8081:8080"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  # --- JupyterLab用コンテナ ---
  jupyter:
    platform: linux/arm64
    build: .
    ports:
      - "8889:8888"
    volumes:
      - .:/app
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''